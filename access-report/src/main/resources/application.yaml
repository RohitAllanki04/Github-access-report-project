spring:
  application:
    name: access-report
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

github:
  token: ${GITHUB_TOKEN}
  org: ${GITHUB_ORG}
  base-url: https://api.github.com
  per-page: 100
  connect-timeout-ms: 5000
  read-timeout-ms: 10000

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info